unbind C-b
set -g prefix M-a
bind -n M-a send-prefix

set -g status on  # Disabling tmux status bar can help

set-option -g history-limit 25000
set -g mouse on

# vi for copy mode
setw -g mode-keys vi

# status bar
set -g status-style "fg=#665c54"
set -g status-left-style "fg=#928374"

set -g status-bg default
set -g status-position top
set -g status-interval 1
set -g status-left ""

# disable status
# set -g status off
# set -g status on

# count the panes from 1
set -g base-index 1
setw -g pane-base-index 1

# reload configuration
bind-key -r r source-file ~/.tmux.conf

# term colors, these are the correct ones according to neovim checkhealth
set-option -g default-terminal "tmux-256color"

# Truecolor support (important for Neovim themes)
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",tmux-256color:Tc"

set -as terminal-features ',xterm-256color:clipboard'
set -as terminal-features ',tmux-256color:clipboard'

# Splits that are easy to remember
bind | split-window -h
bind '\' split-window -h
bind - split-window -v
unbind '"'
unbind %

# Quick window switching with Alt+number (no prefix needed)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Cycle windows with Alt+n/p
bind -n M-n next-window
bind -n M-p previous-window

# Swap panes around
bind > swap-pane -D
bind < swap-pane -U

# Ctrl-b J to join - interactive picker for source window
bind j choose-window "join-pane -s '%%'"

# Ctrl-b s to send - interactive picker for target window  
bind S choose-window "join-pane -t '%%'"

# Pane navigation without prefix (Alt + hjkl)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Resize panes (Alt + Shift + hjkl)
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 2
bind -n M-K resize-pane -U 2
bind -n M-L resize-pane -R 5

set -s escape-time 0

# Pass through CSI u extended key sequences to applications (for neovim/claude code)
set -g extended-keys always
set -as terminal-features ',xterm*:extkeys'
set -as terminal-overrides ',xterm*:Ms=\E]52;c;%p2%s\a'

# Allow applications to use extended keys (fixes Shift+Tab in Claude Code)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Fix flickering in TUI apps like Claude Code
set -g allow-passthrough all

# Enter copy-mode with Prefix + Escape
bind Escape copy-mode

# Prefix + e: open last 500 lines in nvim (new split), trimmed nicely, jump to bottom
unbind e
bind-key e run-shell 'src=$(tmux display-message -p "#{pane_id}"); tmp=/tmp/tmux_last500.txt; \
tmux capture-pane -t "$src" -pS -500 -J \
| sed "s/\r$//" \
| awk '"'"'{ lines[NR]=$0; if ($0 ~ /[^[:space:]]/) last=NR } END { for (i=1; i<=last; i++) print lines[i] }'"'"' \
> "$tmp"; \
tmux split-window -v -l 15 "nvim +\"normal! G\" \"$tmp\""
'

##### Copy-mode vi — stay in copy mode #####

# Exit copy-mode ONLY with q
bind-key -T copy-mode-vi q send-keys -X cancel

# Enter should NOT copy+exit
bind-key -T copy-mode-vi Enter send-keys -X cursor-down

# A should NOT exit copy-mode
bind-key -T copy-mode-vi A send-keys -X end-of-line

# Vim-like selection
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi W send-keys -X select-word

# Use tmux's built-in clipboard integration (often OSC52)
set -g set-clipboard on

# Optional: make y/Y do the same thing (copy but stay)
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T root DoubleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H ; send-keys -X select-word ; run-shell -d 0.3 ; send-keys -X copy-pipe-and-cancel "pbcopy" }
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T root TripleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H ; send-keys -X select-line ; run-shell -d 0.3 ; send-keys -X copy-pipe-and-cancel "pbcopy" }
