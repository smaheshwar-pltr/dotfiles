set-option -g history-limit 25000
set -g mouse on

# vi for copy mode
setw -g mode-keys vi

# status bar
set -g status-style "fg=#665c54"
set -g status-left-style "fg=#928374"

set -g status-bg default
set -g status-position top
set -g status-interval 1
set -g status-left ""

# disable status
# set -g status off
# set -g status on

# count the panes from 1
set -g base-index 1
setw -g pane-base-index 1

# reload configuration
bind-key -r r source-file ~/.tmux.conf

# term colors, these are the correct ones according to neovim checkhealth
set-option -g default-terminal "tmux-256color"

# Truecolor support (important for Neovim themes)
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",tmux-256color:Tc"

# Splits that are easy to remember
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Pane navigation without prefix (Alt + hjkl)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Resize panes (Alt + Shift + hjkl)
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 2
bind -n M-K resize-pane -U 2
bind -n M-L resize-pane -R 5

set -s escape-time 0

# Enter copy-mode with Prefix + Escape
bind Escape copy-mode

# Prefix + e: open last 500 lines in nvim (new split), trimmed nicely, jump to bottom
unbind e
bind-key e run-shell 'src=$(tmux display-message -p "#{pane_id}"); tmp=/tmp/tmux_last500.txt; \
tmux capture-pane -t "$src" -pS -500 -J \
| sed "s/\r$//" \
| awk '"'"'{ lines[NR]=$0; if ($0 ~ /[^[:space:]]/) last=NR } END { for (i=1; i<=last; i++) print lines[i] }'"'"' \
> "$tmp"; \
tmux split-window -v -l 15 "nvim +\"normal! G\" \"$tmp\""
'

##### Copy-mode vi — stay in copy mode #####

# Exit copy-mode ONLY with q
bind-key -T copy-mode-vi q send-keys -X cancel

# Enter should NOT copy+exit
bind-key -T copy-mode-vi Enter send-keys -X cursor-down

# A should NOT exit copy-mode
bind-key -T copy-mode-vi A send-keys -X end-of-line

# Vim-like selection
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi W send-keys -X select-word

# Use tmux's built-in clipboard integration (often OSC52)
set -g set-clipboard on

# Optional: make y/Y do the same thing (copy but stay)
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi Y send-keys -X copy-selection
